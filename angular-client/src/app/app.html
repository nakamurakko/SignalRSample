<div class="div-padding-bottom">
  <span>現在時刻 : {{ currentDateTime() }}</span>
</div>

<div class="full-width">
  <mat-form-field class="form-field-width-stretch"
                  subscriptSizing="dynamic">
    <mat-label>User name</mat-label>
    <input matInput
           placeholder="User name"
           [(ngModel)]="userName" />
  </mat-form-field>
  <mat-form-field class="form-field-width-stretch"
                  subscriptSizing="dynamic">
    <mat-label>Message</mat-label>
    <input matInput
           placeholder="Message"
           [(ngModel)]="inputText" />
  </mat-form-field>
  <button class="button-width"
          matButton="elevated"
          (click)="sendMessage()">Send message</button>
</div>

<table mat-table
       [dataSource]="messages()">
  <ng-container matColumnDef="userName">
    <th mat-header-cell
        *matHeaderCellDef>User Name</th>
    <td mat-cell
        *matCellDef="let message">{{ message.userName }}</td>
  </ng-container>
  <ng-container matColumnDef="message">
    <th mat-header-cell
        *matHeaderCellDef>Message</th>
    <td mat-cell
        *matCellDef="let message">{{ message.message }}</td>
  </ng-container>

  <tr mat-header-row
      *matHeaderRowDef="['userName', 'message']"></tr>
  <tr mat-row
      *matRowDef="let message; columns: ['userName', 'message']"></tr>
</table>

<router-outlet />
